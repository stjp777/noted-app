<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Schedule</title>
  </head>
  <body>
    <h1>Schedules</h1>
    <form action="/schedule/add" method="POST">
      <select name="day">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
      </select>
      <input type="time" name="time" />
      <input type="text" name="content" placeholder="Event description..." />
      <button type="submit">Add Event</button>
    </form>

    {% set days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday",
    "Saturday", "Sunday"] %} {% for day in days %}
    <h3>{{ day }}</h3>
    <ul>
      {% for event in events %} {% if event.day == day %}
      <li>
        {{ event.time }} - {{ event.content }}
        <form
          action="/schedule/delete/{{ event.id }}"
          method="POST"
          style="display: inline"
        >
          <button type="submit">Delete</button>
        </form>
      </li>
      {% endif %} {% endfor %}
    </ul>
    {% endfor %}

    <a href="/">Back to Notes</a>
  </body>
</html>
