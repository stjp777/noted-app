<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <title>Noted</title>
    </head>
    <body>
        <h1>My Notes</h1>

        <form action="/add" method="POST">
            <input type="text" name="content" placeholder="Write a note...">
            <button type="submit">Add Note</button>
        </form>

        <ul>
            {% for note in notes %}
                <li>{{ note.content }}</li>
            {% endfor %}
        </ul>
    
    </body>
</html>
